<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Insertar Curso</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <header>
        <h1>Insertar Curso</h1>
    </header>
    <main>
        <div class="page-actions">
            <a class="page-link" href="index.html">Volver al menú</a>
        </div>


        <form id="formInsertar">
            <label for="id">ID</label>
            <input id="id" type="number" placeholder="ID" required />

            <label for="nombre">Nombre</label>
            <input id="nombre" type="text" placeholder="Nombre" required />

            <div class="row">
                <div>
                    <label for="precioBase">Precio base</label>
                    <input id="precioBase" type="number" step="0.01" placeholder="Precio base" required />
                </div>
                <div>
                    <label for="tamanoMB">Tamaño MB</label>
                    <input id="tamanoMB" type="number" step="0.01" placeholder="Tamaño MB" required />
                </div>
            </div>

            <div class="row">
                <div>
                    <label for="duracionHoras">Duración horas</label>
                    <input id="duracionHoras" type="number" placeholder="Duración horas" required />
                </div>
                <div>
                    <label for="plataforma">Plataforma proveedora</label>
                    <select id="plataforma" required></select>
                </div>
            </div>

            <label class="checkbox-row">
                <input id="certificado" type="checkbox" />
                <span>Certificado</span>
            </label>


            <label for="fechaCertificado">Fecha certificado</label>
            <input id="fechaCertificado" type="datetime-local" />

            <button type="submit">Guardar</button>
        </form>


        <p id="mensaje" class="message"></p>
    </main>

    <script src="js/api.js"></script>
    <script>
        let plataformasCache = [];

        async function cargarPlataformas() {
            const select = document.getElementById("plataforma");
            const mensaje = document.getElementById("mensaje");

            try {
                const plataformas = await listarPlataformas();
                plataformasCache = plataformas || [];

                if (!plataformasCache.length) {
                    select.innerHTML = `<option value="">No hay plataformas registradas</option>`;
                    select.disabled = true;
                    mensaje.textContent = "Primero debes registrar al menos una plataforma en el servidor.";
                    return;
                }

                select.disabled = false;
                select.innerHTML = plataformasCache.map(p =>
                    `<option value="${p.id}">${p.nombre}</option>`
                ).join("");
            } catch (error) {
                select.innerHTML = `<option value="">Error al cargar plataformas</option>`;
                select.disabled = true;
                mensaje.textContent = "No se pudieron cargar las plataformas: " + error.message;
            }
        }

        document.getElementById("formInsertar").addEventListener("submit", async (e) => {
            e.preventDefault();
            const mensaje = document.getElementById("mensaje");

            try {
                const select = document.getElementById("plataforma");

                if (select.disabled || !select.value) {
                    mensaje.textContent = "No hay plataformas disponibles para asociar al curso.";
                    return;
                }

                const plataformaId = parseInt(select.value, 10);
                const plataformaSeleccionada = plataformasCache.find(p => p.id === plataformaId);

                if (!plataformaSeleccionada) {
                    mensaje.textContent = "La plataforma seleccionada no es válida.";
                    return;
                }

                const fechaInput = document.getElementById("fechaCertificado").value;

                const curso = {
                    id: parseInt(document.getElementById("id").value, 10),
                    nombre: document.getElementById("nombre").value,
                    precioBase: parseFloat(document.getElementById("precioBase").value),
                    tamanoMB: parseFloat(document.getElementById("tamanoMB").value),
                    duracionHoras: parseInt(document.getElementById("duracionHoras").value, 10),
                    certificado: document.getElementById("certificado").checked,
                    fechaCertificado: document.getElementById("certificado").checked && fechaInput
                        ? fechaInput.replace("T", " ") + ":00"
                        : null,
                    plataformaProveedora: {
                        id: plataformaSeleccionada.id,
                        nombre: plataformaSeleccionada.nombre,
                        url: plataformaSeleccionada.url,
                        costoSuscripcion: plataformaSeleccionada.costoSuscripcion,
                        soporte24Horas: plataformaSeleccionada.soporte24Horas,
                        fechaFundacion: plataformaSeleccionada.fechaFundacion
                    }
                };

                await insertarCurso(curso);
                mensaje.textContent = "Curso insertado correctamente";
                e.target.reset();
            } catch (error) {
                mensaje.textContent = error.message;
            }
        });

        cargarPlataformas();
    </script>


</body>

</html>
