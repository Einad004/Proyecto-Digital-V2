<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Eliminar Curso</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header>
    <h1>Eliminar Curso</h1>
  </header>
  <main>
    <div class="page-actions">
      <a class="page-link" href="index.html">Volver al menú</a>
    </div>


    <div class="row">
      <input id="idBuscar" type="number" placeholder="ID del curso" />
      <button id="btnBuscar">Buscar</button>
    </div>

    <div id="resultado" class="card"></div>
    <button id="btnEliminar">Eliminar</button>
    <p id="mensaje" class="message"></p>
  </main>

  <script src="js/api.js"></script>
  <script>
    let cursoActual = null;

    function renderCurso(curso) {
      document.getElementById("resultado").innerHTML = `
        <h3>Curso a eliminar</h3>
        <p><strong>ID:</strong> ${curso.id}</p>
        <p><strong>Nombre:</strong> ${curso.nombre}</p>
        <p><strong>Precio:</strong> ${curso.precioBase}</p>
        <p><strong>Tamaño:</strong> ${curso.tamanoMB}</p>
        <p><strong>Duración:</strong> ${curso.duracionHoras}</p>
        <p><strong>Certificado:</strong> ${curso.certificado ? "Sí" : "No"}</p>
        <p><strong>Fecha Certificado:</strong> ${curso.fechaCertificado ?? "Sin fecha"}</p>
        <p><strong>Plataforma:</strong> ${curso.plataformaProveedora ? curso.plataformaProveedora.nombre : "Sin plataforma"}</p>
      `;
    }

    document.getElementById("btnBuscar").addEventListener("click", async () => {
      try {
        cursoActual = await buscarCursoPorId(document.getElementById("idBuscar").value);
        renderCurso(cursoActual);
      } catch (error) {
        document.getElementById("mensaje").textContent = error.message;
      }
    });

    document.getElementById("btnEliminar").addEventListener("click", async () => {
      try {
        if (!cursoActual) {
          document.getElementById("mensaje").textContent = "Primero debes buscar un curso";
          return;
        }

        await eliminarCurso(cursoActual.id);
        document.getElementById("mensaje").textContent = "Curso eliminado correctamente";
        document.getElementById("resultado").innerHTML = "";
        cursoActual = null;
      } catch (error) {
        document.getElementById("mensaje").textContent = error.message;
      }
    });
  </script>
</body>

</html>
