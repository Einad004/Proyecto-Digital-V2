<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Listar Plataformas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header>
    <h1>Listar Plataformas</h1>
  </header>
  <main>
    <div class="page-actions">
      <a class="page-link" href="index.html">Volver al menú</a>
    </div>


    <div class="row">
      <input id="nombreFiltro" type="text" placeholder="Filtrar por nombre..." />
      <button id="btnListar">Listar Todas</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>URL</th>
            <th>Costo Suscripción</th>
            <th>Soporte 24h</th>
            <th>Fecha Fundación</th>
          </tr>
        </thead>
        <tbody id="tablaPlataformas"></tbody>
      </table>
    </div>

    <p id="mensaje" class="message"></p>
  </main>

  <script src="js/api.js"></script>
  <script>
    function renderTabla(plataformas) {
      const tbody = document.getElementById("tablaPlataformas");

      if (!plataformas || plataformas.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6">No se encontraron plataformas</td></tr>`;
        return;
      }

      tbody.innerHTML = plataformas.map(p => `
        <tr>
          <td>${p.id}</td>
          <td>${p.nombre}</td>
          <td><a href="${p.url}" target="_blank">${p.url}</a></td>
          <td>$${p.costoSuscripcion.toFixed(2)}</td>
          <td>${(p.soporte24Horas === 1 || p.soporte24Horas === true) ? "Sí" : "No"}</td>
          <td>${p.fechaFundacion ? p.fechaFundacion.split('T')[0] : "N/A"}</td>
        </tr>
      `).join("");
    }

    // Cargar todas al presionar el botón
    document.getElementById("btnListar").addEventListener("click", async () => {
      try {
        const plataformas = await listarPlataformas();
        renderTabla(plataformas);
      } catch (error) {
        document.getElementById("mensaje").textContent = error.message;
      }
    });

    // Filtro simple en el cliente (opcional, para rapidez)
    document.getElementById("nombreFiltro").addEventListener("input", async (e) => {
      const busqueda = e.target.value.toLowerCase();
      try {
        const todas = await listarPlataformas();
        const filtradas = todas.filter(p =>
          p.nombre.toLowerCase().includes(busqueda)
        );
        renderTabla(filtradas);
      } catch (error) {
        console.error(error);
      }
    });

  </script>
</body>

</html>
