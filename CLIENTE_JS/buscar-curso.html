<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Buscar Curso</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header>
    <h1>Buscar Curso</h1>
  </header>
  <main>
    <div class="page-actions">
      <a class="page-link" href="index.html">Volver al menú</a>
    </div>


    <div class="row">
      <input id="idBuscar" type="number" placeholder="Buscar por ID" />
      <button id="btnBuscarId">Buscar por ID</button>
    </div>

    <div class="row">
      <input id="nombreBuscar" type="text" placeholder="Buscar por nombre" />
      <input id="idPlataformaBuscar" type="number" placeholder="ID Plataforma opcional" />
    </div>
    <button id="btnBuscarParametros">Buscar por parámetros</button>

    <div id="resultado" class="card"></div>
  </main>

  <script src="js/api.js"></script>
  <script>
    function renderCurso(curso) {
      document.getElementById("resultado").innerHTML = `
        <h3>Curso encontrado</h3>
        <p><strong>ID:</strong> ${curso.id}</p>
        <p><strong>Nombre:</strong> ${curso.nombre}</p>
        <p><strong>Precio:</strong> ${curso.precioBase}</p>
        <p><strong>Tamaño:</strong> ${curso.tamanoMB}</p>
        <p><strong>Duración:</strong> ${curso.duracionHoras}</p>
        <p><strong>Certificado:</strong> ${curso.certificado ? "Sí" : "No"}</p>
        <p><strong>Fecha Certificado:</strong> ${curso.fechaCertificado ?? "Sin fecha"}</p>
        <p><strong>Plataforma:</strong> ${curso.plataformaProveedora ? curso.plataformaProveedora.nombre : "Sin plataforma"}</p>
      `;
    }

    document.getElementById("btnBuscarId").addEventListener("click", async () => {
      try {
        const curso = await buscarCursoPorId(document.getElementById("idBuscar").value);
        renderCurso(curso);
      } catch (error) {
        document.getElementById("resultado").textContent = error.message;
      }
    });

    document.getElementById("btnBuscarParametros").addEventListener("click", async () => {
      try {
        const nombre = document.getElementById("nombreBuscar").value;
        const idPlataforma = document.getElementById("idPlataformaBuscar").value;
        const curso = await buscarCursoPorParametros(nombre, idPlataforma);
        renderCurso(curso);
      } catch (error) {
        document.getElementById("resultado").textContent = error.message;
      }
    });
  </script>
</body>

</html>
