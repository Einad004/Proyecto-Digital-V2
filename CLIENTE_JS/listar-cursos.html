<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Listar Cursos</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header>
    <h1>Listar Cursos</h1>
  </header>
  <main>
    <div class="page-actions">
      <a class="page-link" href="index.html">Volver al menú</a>
    </div>


    <div class="row">
      <select id="certificado">
        <option value="">Todos</option>
        <option value="true">Certificado Sí</option>
        <option value="false">Certificado No</option>
      </select>
      <input id="precioMax" type="number" step="0.01" placeholder="Precio máximo" />
    </div>

    <div class="row">
      <button id="btnListar">Listar Todos</button>
      <button id="btnFiltrar">Filtrar</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Tamaño</th>
            <th>Duración</th>
            <th>Certificado</th>
            <th>Fecha</th>
            <th>ID Plataforma</th>
            <th>Plataforma</th>
          </tr>
        </thead>
        <tbody id="tablaCursos"></tbody>
      </table>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    function renderTabla(cursos) {
      document.getElementById("tablaCursos").innerHTML = cursos.map(c => `
        <tr>
          <td>${c.id}</td>
          <td>${c.nombre}</td>
          <td>${c.precioBase}</td>
          <td>${c.tamanoMB}</td>
          <td>${c.duracionHoras}</td>
          <td>${c.certificado ? "Sí" : "No"}</td>
          <td>${c.fechaCertificado ?? "Sin fecha"}</td>
          <td>${c.plataformaProveedora ? c.plataformaProveedora.id : ""}</td>
          <td>${c.plataformaProveedora ? c.plataformaProveedora.nombre : "Sin plataforma"}</td>
        </tr>
      `).join("");
    }

    document.getElementById("btnListar").addEventListener("click", async () => {
      renderTabla(await listarCursos());
    });

    document.getElementById("btnFiltrar").addEventListener("click", async () => {
      const certificado = document.getElementById("certificado").value;
      const precioMax = document.getElementById("precioMax").value;
      renderTabla(await filtrarCursos(certificado, precioMax));
    });
  </script>
</body>

</html>
