<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Buscar Plataforma</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <header>
        <h1>Buscar Plataforma</h1>
    </header>
    <main>
        <div class="page-actions">
            <a class="page-link" href="index.html">Volver al menú</a>
        </div>


        <div class="row">
            <input id="idBuscar" type="number" placeholder="Buscar por ID" />
            <button id="btnBuscarId">Buscar por ID</button>
        </div>

        <div class="row">
            <input id="nombreBuscar" type="text" placeholder="Nombre de la plataforma" />
            <input id="urlBuscar" type="text" placeholder="URL (ej: udemy.com)" />
        </div>
        <button id="btnBuscarParametros">Buscar por parámetros</button>

        <div id="resultado" class="card"></div>
    </main>

    <script src="js/api.js"></script>
    <script>
        // Función para pintar la plataforma en pantalla
        function renderPlataforma(plataforma) {
            // Manejamos el formateo del soporte 24 horas (puede ser boolean o 1/0)
            const tieneSoporte = (plataforma.soporte24Horas === 1 || plataforma.soporte24Horas === true) ? "Sí" : "No";

            document.getElementById("resultado").innerHTML = `
                <h3>Plataforma Encontrada</h3>
                <p><strong>ID:</strong> ${plataforma.id}</p>
                <p><strong>Nombre:</strong> ${plataforma.nombre}</p>
                <p><strong>URL:</strong> <a href="${plataforma.url}" target="_blank">${plataforma.url}</a></p>
                <p><strong>Costo Suscripción:</strong> $${plataforma.costoSuscripcion.toFixed(2)}</p>
                <p><strong>Soporte 24 Horas:</strong> ${tieneSoporte}</p>
                <p><strong>Fecha Fundación:</strong> ${plataforma.fechaFundacion ?? "Sin registrar"}</p>
            `;
        }

        // Evento para buscar por ID
        document.getElementById("btnBuscarId").addEventListener("click", async () => {
            const idVal = document.getElementById("idBuscar").value;
            const resultadoDiv = document.getElementById("resultado");

            if (!idVal) {
                resultadoDiv.textContent = "Por favor, ingresa un ID válido.";
                return;
            }

            try {
                const plataforma = await buscarPlataformaPorId(idVal);
                renderPlataforma(plataforma);
            } catch (error) {
                resultadoDiv.textContent = error.message;
            }
        });

        // Evento para buscar por parámetros (Nombre y URL)
        document.getElementById("btnBuscarParametros").addEventListener("click", async () => {
            const nombre = document.getElementById("nombreBuscar").value;
            const url = document.getElementById("urlBuscar").value;
            const resultadoDiv = document.getElementById("resultado");

            try {
                const plataforma = await buscarPlataformaPorParametros(nombre, url);
                renderPlataforma(plataforma);
            } catch (error) {
                resultadoDiv.textContent = error.message;
            }
        });
    </script>
</body>

</html>
