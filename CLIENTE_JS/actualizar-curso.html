<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Actualizar Curso</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <header>
        <h1>Actualizar Curso</h1>
    </header>
    <main>
        <div class="page-actions">
            <a class="page-link" href="index.html">Volver al menú</a>
        </div>


        <div class="row">
            <input id="idBuscar" type="number" placeholder="ID del curso" />
            <button id="btnBuscar">Buscar</button>
        </div>

        <form id="formActualizar">
            <input id="nombre" type="text" placeholder="Nombre" required />
            <div class="row">
                <input id="precioBase" type="number" step="0.01" placeholder="Precio base" required />
                <input id="tamanoMB" type="number" step="0.01" placeholder="Tamaño MB" required />
            </div>
            <div class="row">
                <input id="duracionHoras" type="number" placeholder="Duración horas" required />
                <select id="plataforma"></select>
            </div>
            <label class="checkbox-row">
                <input id="certificado" type="checkbox" />
                <span>Certificado</span>
            </label>

            <input id="fechaCertificado" type="datetime-local" />
            <button type="submit">Actualizar</button>
        </form>

        <p id="mensaje" class="message"></p>
    </main>

    <script src="js/api.js"></script>
    <script>
        let plataformasCache = [];

        async function cargarPlataformas() {
            const plataformas = await listarPlataformas();
            plataformasCache = plataformas || [];
            const select = document.getElementById("plataforma");

            select.innerHTML = plataformasCache.map(p =>
                `<option value="${p.id}">${p.nombre}</option>`
            ).join("");
        }

        document.getElementById("btnBuscar").addEventListener("click", async () => {
            try {
                const curso = await buscarCursoPorId(document.getElementById("idBuscar").value);
                document.getElementById("nombre").value = curso.nombre;
                document.getElementById("precioBase").value = curso.precioBase;
                document.getElementById("tamanoMB").value = curso.tamanoMB;
                document.getElementById("duracionHoras").value = curso.duracionHoras;
                document.getElementById("certificado").checked = curso.certificado;

                if (curso.fechaCertificado) {
                    document.getElementById("fechaCertificado").value =
                        curso.fechaCertificado.replace(" ", "T").slice(0, 16);
                }

                if (curso.plataformaProveedora) {
                    document.getElementById("plataforma").value = curso.plataformaProveedora.id;
                }
            } catch (error) {
                document.getElementById("mensaje").textContent = error.message;
            }
        });

        document.getElementById("formActualizar").addEventListener("submit", async (e) => {
            e.preventDefault();
            const mensaje = document.getElementById("mensaje");

            try {
                const id = document.getElementById("idBuscar").value;
                const plataformaId = parseInt(document.getElementById("plataforma").value, 10);
                const plataformaSeleccionada = plataformasCache.find(p => p.id === plataformaId);

                if (!plataformaSeleccionada) {
                    mensaje.textContent = "La plataforma seleccionada no es válida.";
                    return;
                }

                const fechaInput = document.getElementById("fechaCertificado").value;

                const curso = {
                    id: parseInt(id, 10),
                    nombre: document.getElementById("nombre").value,
                    precioBase: parseFloat(document.getElementById("precioBase").value),
                    tamanoMB: parseFloat(document.getElementById("tamanoMB").value),
                    duracionHoras: parseInt(document.getElementById("duracionHoras").value, 10),
                    certificado: document.getElementById("certificado").checked,
                    fechaCertificado: document.getElementById("certificado").checked && fechaInput
                        ? fechaInput.replace("T", " ") + ":00"
                        : null,
                    plataformaProveedora: {
                        id: plataformaSeleccionada.id,
                        nombre: plataformaSeleccionada.nombre,
                        url: plataformaSeleccionada.url,
                        costoSuscripcion: plataformaSeleccionada.costoSuscripcion,
                        soporte24Horas: plataformaSeleccionada.soporte24Horas,
                        fechaFundacion: plataformaSeleccionada.fechaFundacion
                    }
                };

                await actualizarCurso(id, curso);
                mensaje.textContent = "Curso actualizado correctamente";
            } catch (error) {
                mensaje.textContent = error.message;
            }
        });

        cargarPlataformas();
    </script>

</body>

</html>
