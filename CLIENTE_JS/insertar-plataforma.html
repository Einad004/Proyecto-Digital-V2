<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Insertar Plataforma</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <header>
        <h1>Insertar Plataforma</h1>
    </header>
    <main>
        <div class="page-actions">
            <a class="page-link" href="index.html">Volver al menú</a>
        </div>


        <form id="formPlataforma">
            <label for="id">ID</label>
            <input id="id" type="number" placeholder="ID (Ej: 1)" required />

            <label for="nombre">Nombre de la Plataforma</label>
            <input id="nombre" type="text" placeholder="Ej: Udemy, Coursera" required />

            <label for="url">URL</label>
            <input id="url" type="url" placeholder="https://ejemplo.com" required />

            <label for="costoSuscripcion">Costo de Suscripción</label>
            <input id="costoSuscripcion" type="number" step="0.01" placeholder="0.00" required />

            <label class="checkbox-row">
                <input id="soporte24Horas" type="checkbox" />
                <span>Soporte 24 Horas</span>
            </label>


            <label for="fechaFundacion">Fecha de Fundación</label>
            <input id="fechaFundacion" type="datetime-local" />

            <button type="submit">Guardar Plataforma</button>
        </form>

        <p id="mensaje" class="message"></p>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.getElementById("formPlataforma").addEventListener("submit", async (e) => {
            e.preventDefault();
            const mensaje = document.getElementById("mensaje");

            try {
                const fechaInput = document.getElementById("fechaFundacion").value;

                // Construimos el objeto siguiendo el modelo de Java
                const plataforma = {
                    id: parseInt(document.getElementById("id").value, 10),
                    nombre: document.getElementById("nombre").value,
                    url: document.getElementById("url").value,
                    costoSuscripcion: parseFloat(document.getElementById("costoSuscripcion").value),
                    // En Oracle/Java el boolean se suele mapear a 1/0 o true/false
                    soporte24Horas: document.getElementById("soporte24Horas").checked ? 1 : 0,
                    // Formateo de fecha para el TIMESTAMP de Oracle
                    fechaFundacion: fechaInput ? fechaInput.replace("T", " ") + ":00" : null
                };

                // Llamada a la función del api.js
                await insertarPlataforma(plataforma);

                mensaje.textContent = "Plataforma insertada con éxito";
                mensaje.style.color = "green";
                e.target.reset();
            } catch (error) {
                mensaje.textContent = "Error: " + error.message;
                mensaje.style.color = "red";
            }
        });
    </script>
</body>

</html>
